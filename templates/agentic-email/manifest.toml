version = 1

[install]
git.pkg-path = "git"
curl.pkg-path = "curl"
jq.pkg-path = "jq"
ripgrep.pkg-path = "ripgrep"

[vars]
PROJECT_TYPE = "agentic-email"

[hook]
on-activate = '''
  if [ -f "$FLOX_ENV_PROJECT/.env" ]; then
    set -a; source "$FLOX_ENV_PROJECT/.env"; set +a
  fi

  mkdir -p "$FLOX_ENV_PROJECT/voice/samples"
  mkdir -p "$FLOX_ENV_PROJECT/drafts"
  mkdir -p "$FLOX_ENV_PROJECT/triage"

  export PROJECT_HOME="$FLOX_ENV_PROJECT"

  printf "\n  agentic-email  %s\n\n" "$(basename "$FLOX_ENV_PROJECT")"
'''

[profile]
common = '''
  alias inbox="echo 'Run /triage in Claude Code to process your inbox'"
  alias voice="cat $FLOX_ENV_PROJECT/voice/style-guide.md"
'''

[options]
systems = ["aarch64-darwin"]
