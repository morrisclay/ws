name: "{{name}}"
template: "deal-war-room"
created: "{{date}}"

ingest:
  company: "{{name}}"
  url: ""
  crunchbase: ""
  linear_project_id: ""
  sectors: []
  extra_queries: []

layout:
  panes:
    - name: "main"
      direction: null
      surfaces:
        - name: "claude"
          type: terminal
          command: "claude --dangerously-skip-permissions"
          activate_flox: true
        - name: "shell"
          type: terminal
          activate_flox: true

    - name: "intel"
      direction: "right"
      split_from: "main"
      surfaces:
        - name: "company"
          type: browser
          url: "https://google.com"
        - name: "linkedin"
          type: browser
          url: "https://linkedin.com"
        - name: "crunchbase"
          type: browser
          url: "https://crunchbase.com"

    - name: "docs"
      direction: "down"
      split_from: "intel"
      surfaces:
        - name: "notes"
          type: terminal
          activate_flox: true

bookmarks:
  - name: "PitchBook"
    url: "https://pitchbook.com"
  - name: "SEC EDGAR"
    url: "https://www.sec.gov/cgi-bin/browse-edgar"
  - name: "LinkedIn"
    url: "https://linkedin.com"
  - name: "Crunchbase"
    url: "https://crunchbase.com"
  - name: "G2"
    url: "https://www.g2.com"

status:
  - key: "type"
    value: "deal-war-room"
    icon: "briefcase.fill"
    color: "#EF4444"
  - key: "stage"
    value: "initial-review"
    icon: "flag.fill"

factory:
  agent: "tigerclaw-analyst"
  auto_index: false
