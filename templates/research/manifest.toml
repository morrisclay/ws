version = 1

[install]
git.pkg-path = "git"
curl.pkg-path = "curl"
jq.pkg-path = "jq"
ripgrep.pkg-path = "ripgrep"

[vars]
PROJECT_TYPE = "research"

[hook]
on-activate = '''
  if [ -f "$FLOX_ENV_PROJECT/.env" ]; then
    set -a; source "$FLOX_ENV_PROJECT/.env"; set +a
  fi

  mkdir -p "$FLOX_ENV_PROJECT/research"
  mkdir -p "$FLOX_ENV_PROJECT/data"
  mkdir -p "$FLOX_ENV_PROJECT/output"

  export PROJECT_HOME="$FLOX_ENV_PROJECT"
  export RESEARCH_DIR="$FLOX_ENV_PROJECT/research"

  printf "\n  research  %s\n\n" "$(basename "$FLOX_ENV_PROJECT")"
'''

[profile]
common = '''
  alias research="ls -1 $FLOX_ENV_PROJECT/research/"
  alias data="ls -1 $FLOX_ENV_PROJECT/data/"
'''

[options]
systems = ["aarch64-darwin"]
