name: "{{name}}"
template: "research"
created: "{{date}}"

ingest:
  topic: "{{name}}"
  linear_project_id: ""
  extra_queries: []

layout:
  panes:
    - name: "main"
      direction: null
      surfaces:
        - name: "claude"
          type: terminal
          command: "claude --dangerously-skip-permissions"
          activate_flox: true
        - name: "shell"
          type: terminal
          activate_flox: true

    - name: "browser"
      direction: "right"
      split_from: "main"
      surfaces:
        - name: "web"
          type: browser
          url: "https://google.com"
        - name: "wiki"
          type: browser
          url: "https://en.wikipedia.org"

bookmarks:
  - name: "Google Scholar"
    url: "https://scholar.google.com"

status:
  - key: "type"
    value: "research"
    icon: "magnifyingglass"
    color: "#8B5CF6"
