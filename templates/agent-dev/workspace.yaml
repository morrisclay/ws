name: "{{name}}"
template: "agent-dev"
created: "{{date}}"

layout:
  panes:
    - name: "main"
      direction: null
      surfaces:
        - name: "claude"
          type: terminal
          command: "claude --dangerously-skip-permissions"
          activate_flox: true
        - name: "shell"
          type: terminal
          activate_flox: true

    - name: "test"
      direction: "right"
      split_from: "main"
      surfaces:
        - name: "runner"
          type: terminal
          activate_flox: true
        - name: "logs"
          type: terminal
          activate_flox: true

    - name: "browser"
      direction: "down"
      split_from: "test"
      surfaces:
        - name: "localhost"
          type: browser
          url: "http://localhost:3000"
        - name: "docs"
          type: browser
          url: "https://docs.anthropic.com"

services:
  - name: "dev-server"
    port: 3000
    timeout: 30
    url: "http://localhost:3000"

status:
  - key: "type"
    value: "agent-dev"
    icon: "cpu"
    color: "#10B981"
